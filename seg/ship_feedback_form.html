{% block js %}
<script>
  document.addEventListener('DOMContentLoaded', function () {
    const radios = document.querySelectorAll('input[name="mmd_working"]');
    const reasonWrap = document.getElementById('noReasonWrap');

    function toggleReason() {
      const selected = document.querySelector('input[name="mmd_working"]:checked');
      if (selected && selected.value === 'no') {
        reasonWrap.classList.remove('d-none');
      } else {
        reasonWrap.classList.add('d-none');
      }
    }

    radios.forEach(function (radio) {
      radio.addEventListener('change', toggleReason);
    });

    toggleReason();

    const stars = document.querySelectorAll('input[name="seg_rating"]');
    const labels = document.querySelectorAll('label[for^="star"]');
    const ratingText = document.getElementById('ratingText');

    const ratingMap = {
      1: 'Unsatisfied',
      2: 'Satisfied',
      3: 'OK',
      4: 'Good',
      5: 'Excellent'
    };

    function updateStars(value) {
      labels.forEach(function (label, index) {
        if (index < value) {
          label.classList.remove('btn-outline-primary');
          label.classList.add('btn-primary');
        } else {
          label.classList.add('btn-outline-primary');
          label.classList.remove('btn-primary');
        }
      });

      if (ratingText) {
        ratingText.innerText = ratingMap[value] || '';
      }
    }

    stars.forEach(function (star) {
      star.addEventListener('change', function () {
        updateStars(parseInt(this.value, 10));
      });
    });
  });
</script>
{% endblock js %}
